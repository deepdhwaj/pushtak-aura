<!DOCTYPE html>
<html lang="zxx">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1">
    <meta name="format-detection" content="telephone=no">

    <title>Upload Book - Pustak Aura</title>

    <!-- Favicon -->
    <link href="img/book-alt.png" rel="icon" type="image/x-icon" />

    <!-- Fonts -->
    <link href="css/font-awesome.min.css" rel="stylesheet" type="text/css" />

    <!-- Mobile Menu -->
    <link href="css/mmenu.css" rel="stylesheet" type="text/css" />
    <link href="css/mmenu.positioning.css" rel="stylesheet" type="text/css" />

    <!-- Styles -->
    <link href="css/jquery-ui.min.css" rel="stylesheet" type="text/css" />
    <link href="css/style.css" rel="stylesheet" type="text/css" />
    <link href="css/mobile-menu-theme.css" rel="stylesheet" type="text/css" />
    <style>
        .btn-upload-book {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-upload-book,
        .btn-upload-book:hover,
        .btn-upload-book:focus {
            color: #fff !important;
        }
    </style>
</head>

<body>

    <!-- Start: Header Section (loaded from partials/navbar.html) -->
    <div id="navbar-placeholder"></div>
    <!-- End: Header Section -->

    <!-- ================= PAGE BANNER ================= -->
    <section class="inner-page-banner">
        <div class="container">
            <div class="banner-header text-center">
                <h2>Upload New Book</h2>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb justify-content-center">
                        <li class="breadcrumb-item"><a href="index.html">Home</a></li>
                        <li class="breadcrumb-item active">Upload Book</li>
                    </ol>
                </nav>
            </div>
        </div>
    </section>

    <!-- ================= MAIN CONTENT ================= -->
    <div id="content" class="site-content">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8">

                    <div class="card p-4 mb-5" style="box-shadow: 0 5px 20px rgba(0,0,0,0.1); border-radius: 10px;">

                        <form id="uploadForm" enctype="multipart/form-data">

                            <div class="form-group">
                                <label>Book Title <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="title" id="title" required placeholder="Enter book title">
                            </div>

                            <div class="form-group">
                                <label>Book Description</label>
                                <textarea class="form-control" name="description" rows="4" placeholder="Enter description"></textarea>
                            </div>

                            <div class="form-group">
                                <label>Author Name <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="author" id="author" required placeholder="Enter author name">
                            </div>

                            <div class="form-group">
                                <label>Publishing Date</label>
                                <input type="date" class="form-control" name="publishDate">
                            </div>

                            <div class="form-group">
                                <label>ISBN Number</label>
                                <input type="text" class="form-control" name="isbn" placeholder="Enter ISBN">
                            </div>

                            <div class="form-group">
                                <label>Upload PDF File <span class="text-danger">*</span></label>
                                <input type="file" class="form-control" name="pdfFile" id="pdfFile" accept=".pdf" required>
                            </div>

                            <div class="form-group">
                                <label>Upload Thumbnail Image <span class="text-danger">*</span></label>
                                <input type="file" class="form-control" name="thumbnail" id="thumbnail" accept="image/*" required>
                            </div>

                            <div class="text-center mt-4">
                                <button type="submit" class="btn btn-primary px-5 btn-upload-book">
                                    <i class="fa fa-upload"></i> <span>Upload Book</span>
                                </button>
                            </div>

                        </form>

                        <div id="responseMessage" class="mt-3 text-center"></div>

                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- ================= FOOTER (SIMPLE VERSION) ================= -->
    <footer class="site-footer">
        <div class="container text-center py-4">
            <p>&copy; 2026 Pustak Aura. All Rights Reserved.</p>
        </div>
    </footer>

    <!-- ================= JAVASCRIPT ================= -->

    <script src="js/jquery-2.2.3.min.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/mmenu.min.js"></script>
    <script src="js/harvey.min.js"></script>
    <script src="js/navbar-loader.js"></script>
    <script src="js/main.js"></script>

    <script>
        document.getElementById("uploadForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const msgEl = document.getElementById("responseMessage");
            const title = (document.getElementById("title") || this.querySelector('[name="title"]')).value.trim();
            const author = (document.getElementById("author") || this.querySelector('[name="author"]')).value.trim();
            const pdfFile = document.getElementById("pdfFile") || this.querySelector('[name="pdfFile"]');
            const thumbnail = document.getElementById("thumbnail") || this.querySelector('[name="thumbnail"]');

            const errors = [];
            if (!title) errors.push("Book Title is required.");
            if (!author) errors.push("Author Name is required.");
            if (!pdfFile || !pdfFile.files || pdfFile.files.length === 0) errors.push("PDF File is required.");
            if (!thumbnail || !thumbnail.files || thumbnail.files.length === 0) errors.push("Thumbnail Image is required.");

            if (errors.length > 0) {
                msgEl.innerHTML = "<span style='color:red'>" + errors.join(" ") + "</span>";
                return;
            }

            msgEl.innerHTML = "";

            const formData = new FormData(this);

            try {
                console.log("uploading book...");
                console.log("formdata",formData);
                const baseUrl = window.location.origin;
                const endpoint = `${baseUrl}/upload-book`;
                const response = await fetch(endpoint, {
                    method: "POST",
                    body: formData
                });

                const result = await response.json();

                if (response.ok && result.message) {
                    document.getElementById("responseMessage").innerHTML =
                        "<span style='color:green'>" + result.message + "</span>";
                    this.reset();
                    setTimeout(function () {
                        window.location.href = window.location.origin + "/books-media";
                    }, 1500);
                } else {
                    document.getElementById("responseMessage").innerHTML =
                        "<span style='color:red'>" + (result.message || "Upload failed!") + "</span>";
                }

            } catch (error) {
                document.getElementById("responseMessage").innerHTML =
                    "<span style='color:red'>Upload failed!</span>";
            }
        });
    </script>

</body>
</html>
