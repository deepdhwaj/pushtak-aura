<!DOCTYPE html>
<html>
<head>
    <title>Upload Book</title>
</head>
<body>

<h2>Upload Book</h2>

<form id="bookForm" enctype="multipart/form-data">
    <input type="text" name="title" placeholder="Book Title" required><br><br>
    <textarea name="description" placeholder="Description"></textarea><br><br>
    <input type="text" name="author" placeholder="Author Name"><br><br>
    <input type="date" name="publish_date"><br><br>
    <input type="text" name="isbn" placeholder="ISBN"><br><br>

    <input type="file" name="pdf_file" accept=".pdf" required><br><br>
    <input type="file" name="thumbnail" accept="image/*" required><br><br>

    <button type="submit">Upload</button>
</form>

<p id="msg"></p>

<script>
document.getElementById("bookForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const formData = new FormData(this);

    const response = await fetch("http://localhost:5000/upload", {
        method: "POST",
        body: formData
    });

    const result = await response.json();
    document.getElementById("msg").innerText = result.message;
});
</script>

</body>
</html>
